# nginx.conf
# Standard Nginx server configuration for clean, extensionless URLs

server {
    listen 80;
    server_name www.airmedical24x7.com airmedical24x7.com;
    root /var/www/html;
    index index.html;

    # 1. Redirect direct requests for index.html or /index to the root / (SEO best practice)
    if ($request_uri ~* "^/index(\.html)?$") {
        return 301 /;
    }

    # 2. Redirect direct requests for *.html files (excluding index.html) to their clean URL version
    if ($request_uri ~* "^/(?!index\.html)(.+)\.html$") {
        return 301 /$1;
    }

    # 3. Handle pretty URLs: try clean file, then directory, then append .html internally
    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}
